name: Bug report
description: Report a reproducible problem in Finimatic
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, .env files, raw database files, inbox content, or API keys.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
      placeholder: |
        1. Start backend with ...
        2. Start frontend with ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: backend-version
    attributes:
      label: Python version
      placeholder: "3.11.x"
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "20.x"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Frontend
        - Settings/secrets
        - Gmail SMTP/IMAP
        - AI generation
        - Queue/policy
        - Follow-ups
        - Replies/conversations
        - Floating assistant
        - Documentation
    validations:
      required: true
