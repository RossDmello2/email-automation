name: Manual Platform Deploy

on:
  workflow_dispatch:
    inputs:
      vercel_project:
        description: "Vercel project name to create/use"
        required: true
        default: "finimatic-frontend"
      render_service:
        description: "Render web service name to create"
        required: true
        default: "finimatic-backend"
      allowed_origins:
        description: "Comma-separated frontend origins for backend CORS"
        required: true
        default: "https://finimatic-frontend.vercel.app,https://finimatic-rossdmello2.netlify.app"

jobs:
  create-render-backend:
    name: Create Render backend
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.render.outputs.backend_url }}
    steps:
      - name: Create Render service
        id: render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
          SERVICE_NAME: ${{ inputs.render_service }}
          ALLOWED_ORIGINS: ${{ inputs.allowed_origins }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          required = ["RENDER_API_KEY", "DATABASE_URL", "FERNET_KEY"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print(f"Missing required secret(s): {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          headers = {
              "Authorization": f"Bearer {os.environ['RENDER_API_KEY']}",
              "Accept": "application/json",
              "Content-Type": "application/json",
          }

          def request(method, path, body=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  f"https://api.render.com/v1{path}",
                  data=data,
                  headers=headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      raw = response.read().decode("utf-8")
                      return response.status, json.loads(raw) if raw else None
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8")
                  print(raw, file=sys.stderr)
                  return exc.code, json.loads(raw) if raw else None

          status, owners = request("GET", "/owners?limit=20")
          if status != 200 or not owners:
              print(f"Unable to list Render workspaces: HTTP {status}", file=sys.stderr)
              sys.exit(1)

          owner_id = owners[0]["owner"]["id"]
          service_name = os.environ["SERVICE_NAME"]
          fallback_url = f"https://{service_name}.onrender.com"

          payload = {
              "type": "web_service",
              "name": service_name,
              "ownerId": owner_id,
              "repo": "https://github.com/RossDmello2/email-automation",
              "branch": "main",
              "rootDir": "backend",
              "autoDeploy": "yes",
              "envVars": [
                  {"key": "FERNET_KEY", "value": os.environ["FERNET_KEY"]},
                  {"key": "DATABASE_URL", "value": os.environ["DATABASE_URL"]},
                  {"key": "ALLOWED_ORIGINS", "value": os.environ["ALLOWED_ORIGINS"]},
                  {"key": "FINIMATIC_DISABLE_SCHEDULER", "value": "0"},
              ],
              "serviceDetails": {
                  "runtime": "python",
                  "plan": "free",
                  "region": "singapore",
                  "healthCheckPath": "/api/health",
                  "envSpecificDetails": {
                      "buildCommand": "pip install -r requirements.txt",
                      "startCommand": "uvicorn app.main:app --host 0.0.0.0 --port $PORT",
                  },
              },
          }

          status, created = request("POST", "/services", payload)
          if status not in (201, 409):
              print(f"Render service creation failed: HTTP {status}", file=sys.stderr)
              sys.exit(1)

          service = (created or {}).get("service", {})
          url = (
              service.get("serviceDetails", {}).get("url")
              or service.get("url")
              or fallback_url
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"backend_url={url}\n")

          print(f"Render backend URL candidate: {url}")
          PY

  deploy-vercel-frontend:
    name: Deploy Vercel frontend
    needs: create-render-backend
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
      VERCEL_PROJECT: ${{ inputs.vercel_project }}
      VITE_API_URL: ${{ needs.create-render-backend.outputs.backend_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy frontend
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN" >&2
            exit 1
          fi

          scope_args=()
          if [ -n "$VERCEL_SCOPE" ]; then
            scope_args=(--scope "$VERCEL_SCOPE")
          fi

          vercel deploy \
            --prod \
            --yes \
            --project "$VERCEL_PROJECT" \
            --token "$VERCEL_TOKEN" \
            --build-env "VITE_API_URL=$VITE_API_URL" \
            --env "VITE_API_URL=$VITE_API_URL" \
            "${scope_args[@]}"
